<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配件成本管理 · 管理员</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: system-ui, sans-serif; }
    body { background: #f5f7fb; padding: 20px; }
    .admin-container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 28px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    h2 { color: #1e293b; margin-bottom: 20px; }
    .login-panel { text-align: center; padding: 40px; }
    .login-panel input { padding: 12px 20px; border-radius: 40px; border: 1px solid #cbd5e1; width: 250px; margin-right: 10px; }
    .btn { background: white; border: 1px solid #cbd5e1; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-size: 0.9rem; }
    .btn-primary { background: #1e293b; color: white; }
    .btn-danger { background: #dc2626; color: white; }
    .btn-success { background: #10b981; color: white; }
    .category-section { background: #f8fafc; border-radius: 20px; padding: 16px; margin-bottom: 20px; }
    .category-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { padding: 10px 6px; text-align: left; border-bottom: 1px solid #e2e8f0; }
    .editable-cell input { width: 100%; padding: 6px 10px; border-radius: 16px; border: 1px solid #d1d9e6; }
    .flex { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .import-export-bar { background: #eef2ff; padding: 15px; border-radius: 40px; margin-bottom: 20px; }
    .file-input { display: none; }
    .user-mgmt { background: #f0fdf4; border-radius: 20px; padding: 20px; margin-top: 30px; }
    .user-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
    .user-row input { padding: 8px 14px; border-radius: 20px; border: 1px solid #cbd5e1; }
  </style>
</head>
<body>
<div id="app" class="admin-container">
  <div v-if="!isLoggedIn" class="login-panel">
    <h2>🔐 管理员登录</h2>
    <input type="password" v-model="passwordInput" placeholder="请输入管理密码" @keyup.enter="login" />
    <button class="btn btn-primary" @click="login">进入管理</button>
    <p style="margin-top: 16px; color: #94a3b8;">默认密码: admin123</p>
  </div>

  <div v-else>
    <div class="flex" style="justify-content: space-between; margin-bottom: 20px;">
      <h2>📋 配件库维护 & 用户管理</h2>
      <div class="flex">
        <button class="btn btn-danger" @click="clearAllItems">🧹 清空配件库</button>
        <button class="btn btn-primary" @click="exportData">导出数据</button>
        <button class="btn" @click="logout">退出</button>
      </div>
    </div>
    <div class="import-export-bar flex">
      <button class="btn" @click="downloadSimpleTemplate">📥 下载模板 (CSV)</button>
      <label class="btn" style="cursor:pointer;">
        📤 上传导入
        <input type="file" class="file-input" accept=".csv,.json" @change="handleFileUpload" />
      </label>
      <span style="color: #94a3b8;">导入自动识别CPU/主板插槽</span>
    </div>

    <div v-for="cat in allCategories" :key="cat.id" class="category-section">
      <div class="category-header">
        <span style="font-weight:700; font-size:1.1rem;">{{ cat.name }}</span>
        <button class="btn" @click="addItem(cat.id)">➕ 新增</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>名称/型号</th><th>成本 (¥)</th>
            <th v-if="cat.id==='cpu'">插槽</th><th v-if="cat.id==='cpu'">TDP</th>
            <th v-if="cat.id==='motherboard'">插槽</th>
            <th v-if="cat.id==='gpu'">功耗W</th>
            <th v-if="cat.id==='cooler'">散热TDP</th><th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="item in categoryItems(cat.id)" :key="item.id">
            <td class="editable-cell"><input v-model="item.name" /></td>
            <td class="editable-cell"><input v-model.number="item.cost" type="number" style="width:100px" /></td>
            <td v-if="cat.id==='cpu'" class="editable-cell"><input v-model="item.socket" /></td>
            <td v-if="cat.id==='cpu'" class="editable-cell"><input v-model.number="item.tdp" type="number" style="width:70px" /></td>
            <td v-if="cat.id==='motherboard'" class="editable-cell"><input v-model="item.socket" /></td>
            <td v-if="cat.id==='gpu'" class="editable-cell"><input v-model.number="item.power" type="number" style="width:80px" /></td>
            <td v-if="cat.id==='cooler'" class="editable-cell"><input v-model.number="item.coolingTdp" type="number" style="width:90px" /></td>
            <td><span @click="removeItem(cat.id, item.id)" style="cursor:pointer;">🗑️</span></td>
          </tr>
        </tbody>
      </table>
    </div>
    <button class="btn" @click="resetToDefault">恢复默认配件数据</button>

    <!-- 用户管理区域 -->
    <div class="user-mgmt">
      <h3 style="margin-bottom: 15px;">👥 报价器用户账号管理</h3>
      <div class="flex" style="margin-bottom: 15px;">
        <input v-model="newUsername" placeholder="用户名" style="padding:8px 14px; border-radius:20px; border:1px solid #cbd5e1;" />
        <input v-model="newPassword" type="password" placeholder="密码" style="padding:8px 14px; border-radius:20px; border:1px solid #cbd5e1;" />
        <button class="btn btn-success" @click="addUser">➕ 添加账号</button>
      </div>
      <div v-if="users.length === 0" style="color:#94a3b8;">暂无用户，添加后报价器页面需要登录才能使用</div>
      <div v-for="(user, idx) in users" :key="idx" class="user-row">
        <span style="width:120px;">{{ user.username }}</span>
        <span style="color:#94a3b8;">••••••</span>
        <button class="btn btn-danger" @click="deleteUser(idx)">删除</button>
      </div>
    </div>
  </div>
</div>

<script>
  const { createApp, ref, reactive, watch } = Vue;

  // ===== 配置区 =====
  const API_BASE = ''; // 替换为你的 Worker 域名
  const ADMIN_TOKEN = 'marryme'; // 必须与 Worker 中的一致
  const ADMIN_PASSWORD = 'admin123'; // 登录 admin.html 的密码

  const defaultCategories = [
    { id: 'cpu', name: 'CPU' }, { id: 'gpu', name: '显卡' }, { id: 'motherboard', name: '主板' },
    { id: 'memory', name: '内存' }, { id: 'power', name: '电源' }, { id: 'case', name: '机箱' },
    { id: 'ssd', name: '固态硬盘' }, { id: 'hdd', name: '机械硬盘' }, { id: 'cooler', name: '散热器' },
    { id: 'fan', name: '机箱风扇' }, { id: 'monitor', name: '显示器' }, { id: 'other', name: '其他' }
  ];

  const defaultItems = {
    cpu: [ { id: 'cpu1', name: 'Intel 酷睿 i5-12400F', cost: 850, socket: 'LGA1700', tdp: 65 } ],
    gpu: [ { id: 'gpu1', name: 'RTX 4060 8G', cost: 1900, power: 115 } ],
    motherboard: [ { id: 'mb1', name: '华硕 H610M-K', cost: 420, socket: 'LGA1700' } ],
    memory: [ { id: 'ram1', name: '金士顿 16G DDR4', cost: 280 } ],
    power: [ { id: 'psu1', name: '650W 铜牌', cost: 160, watt: 650 } ],
    case: [ { id: 'case1', name: '海景房', cost: 120 } ],
    ssd: [ { id: 'ssd1', name: '512G NVMe', cost: 240 } ],
    hdd: [ { id: 'hdd1', name: '1T 机械硬盘', cost: 300 } ],
    cooler: [ { id: 'cool1', name: '4热管风冷', cost: 40, coolingTdp: 150 } ],
    fan: [ { id: 'fan1', name: '无风扇', cost: 0 } ],
    monitor: [ { id: 'mon1', name: '24寸 144Hz', cost: 450 } ],
    other: [ { id: 'oth1', name: '办公键鼠', cost: 40 } ]
  };

  const genId = () => Date.now() + '-' + Math.random().toString(36).substr(2,6);

  // 智能识别函数
  const inferCpuInfo = (n) => {
    if (n.includes('12')||n.includes('13')||n.includes('14')) return {socket:'LGA1700',tdp:65};
    if (n.includes('10')||n.includes('11')) return {socket:'LGA1200',tdp:65};
    if (n.includes('AM5')||n.includes('7')) return {socket:'AM5',tdp:65};
    return {socket:'AM4',tdp:65};
  };
  const inferGpuPower = (n) => n.includes('4060')?115:n.includes('4070')?200:150;
  const inferMotherboardSocket = (n) => {
    if (n.includes('H610')||n.includes('B660')||n.includes('Z690')) return 'LGA1700';
    if (n.includes('B550')||n.includes('X570')) return 'AM4';
    if (n.includes('B650')) return 'AM5';
    return '';
  };
  const guessCategory = (n) => {
    const lower = n.toLowerCase();
    if (lower.includes('cpu')||lower.includes('酷睿')||lower.includes('锐龙')) return 'cpu';
    if (lower.includes('rtx')||lower.includes('gtx')||lower.includes('显卡')) return 'gpu';
    if (lower.includes('主板')||lower.includes('h610')) return 'motherboard';
    if (lower.includes('内存')||lower.includes('ddr')) return 'memory';
    if (lower.includes('电源')) return 'power';
    if (lower.includes('机箱')) return 'case';
    if (lower.includes('固态')||lower.includes('ssd')) return 'ssd';
    if (lower.includes('机械')||lower.includes('hdd')) return 'hdd';
    if (lower.includes('散热')) return 'cooler';
    if (lower.includes('显示器')) return 'monitor';
    return 'other';
  };

  const app = createApp({
    setup() {
      const isLoggedIn = ref(false);
      const passwordInput = ref('');
      const allCategories = ref(defaultCategories);
      const itemsData = reactive({});
      const users = ref([]);
      const newUsername = ref('');
      const newPassword = ref('');

      // 登录 admin 面板
      const login = () => {
        if (passwordInput.value === ADMIN_PASSWORD) {
          isLoggedIn.value = true;
          loadData();
          loadUsers();
        } else {
          alert('密码错误');
        }
        passwordInput.value = '';
      };
      const logout = () => { isLoggedIn.value = false; };

      // 从 KV 加载配件数据
      async function loadData() {
        try {
          const res = await fetch(`${API_BASE}/api/data`);
          if (res.ok) {
            const remote = await res.json();
            if (remote.parts && Object.keys(remote.parts).length > 0) {
              Object.assign(itemsData, remote.parts);
            }
          }
        } catch(e) {}
        // 如果KV没有数据，使用默认数据
        if (!itemsData.cpu || itemsData.cpu.length === 0) {
          setDefault();
        }
        allCategories.value.forEach(c => { if(!itemsData[c.id]) itemsData[c.id] = []; });
      }

      const setDefault = () => {
        allCategories.value.forEach(cat => {
          itemsData[cat.id] = defaultItems[cat.id] ? [...defaultItems[cat.id].map(it => ({...it, id: it.id||genId()}))] : [];
        });
        saveToStorage();
      };

      // 保存配件数据到 KV
      async function saveToStorage() {
        try {
          await fetch(`${API_BASE}/api/parts`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${ADMIN_TOKEN}`
            },
            body: JSON.stringify({ parts: { ...itemsData } })
          });
        } catch(e) { console.error('保存失败', e); }
      }

      // 用户管理 API
      async function loadUsers() {
        try {
          const res = await fetch(`${API_BASE}/api/users`, {
            headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
          });
          if (res.ok) users.value = await res.json();
        } catch(e) {}
      }

      async function addUser() {
        const u = newUsername.value.trim();
        const p = newPassword.value.trim();
        if (!u || !p) return alert('用户名密码不能为空');
        try {
          const res = await fetch(`${API_BASE}/api/register`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${ADMIN_TOKEN}`
            },
            body: JSON.stringify({ username: u, password: p })
          });
          if (res.ok) {
            newUsername.value = ''; newPassword.value = '';
            await loadUsers();
          } else if (res.status === 409) {
            alert('用户名已存在');
          }
        } catch(e) { alert('添加失败'); }
      }

      async function deleteUser(idx) {
        const username = users.value[idx].username;
        try {
          const res = await fetch(`${API_BASE}/api/user?username=${encodeURIComponent(username)}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${ADMIN_TOKEN}` }
          });
          if (res.ok) await loadUsers();
        } catch(e) { alert('删除失败'); }
      }

      const categoryItems = (catId) => itemsData[catId] || [];
      const addItem = (catId) => {
        const newItem = { id: genId(), name: '新配件', cost: 0 };
        if (catId==='cpu') { newItem.socket=''; newItem.tdp=65; }
        if (catId==='motherboard') newItem.socket='';
        if (catId==='gpu') newItem.power=100;
        itemsData[catId].push(newItem); saveToStorage();
      };
      const removeItem = (catId, id) => {
        const idx = itemsData[catId].findIndex(i=>i.id===id);
        if(idx>-1) itemsData[catId].splice(idx,1); saveToStorage();
      };
      const clearAllItems = () => {
        if(confirm('清空所有配件？')) { allCategories.value.forEach(c => itemsData[c.id] = []); saveToStorage(); }
      };
      const resetToDefault = () => { setDefault(); };

      const exportData = () => {
        const blob = new Blob([JSON.stringify(itemsData)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'diy_cost.json'; a.click();
      };
      const downloadSimpleTemplate = () => {
        let csv = '配件名称,成本\nIntel i5-12400F,850\nRTX 4060,1900\n华硕 H610M-K,420';
        const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '模板.csv'; a.click();
      };
      const handleFileUpload = (e) => {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const content = ev.target.result;
          try {
            if (file.name.endsWith('.json')) { Object.assign(itemsData, JSON.parse(content)); saveToStorage(); alert('导入成功'); }
            else {
              const lines = content.split('\n').filter(l => l.trim() && !l.startsWith('#'));
              const headers = lines[0].split(',').map(h=>h.trim());
              const nameIdx = headers.findIndex(h=>h.includes('名称')), costIdx = headers.findIndex(h=>h.includes('成本'));
              for (let i=1; i<lines.length; i++) {
                const cols = lines[i].split(',').map(c=>c.trim());
                if(cols.length<2) continue;
                const name = cols[nameIdx], cost = parseFloat(cols[costIdx])||0;
                const catId = guessCategory(name);
                const newItem = { id: genId(), name, cost };
                if(catId==='cpu') { const info=inferCpuInfo(name); newItem.socket=info.socket; newItem.tdp=info.tdp; }
                if(catId==='gpu') newItem.power = inferGpuPower(name);
                if(catId==='motherboard') newItem.socket = inferMotherboardSocket(name);
                itemsData[catId].push(newItem);
              }
              saveToStorage(); alert('导入成功');
            }
          } catch(err) { alert('解析失败'); }
          e.target.value = '';
        };
        reader.readAsText(file, 'UTF-8');
      };

      watch(itemsData, () => saveToStorage(), { deep: true });

      return {
        isLoggedIn, passwordInput, login, logout,
        allCategories, itemsData, categoryItems,
        addItem, removeItem, clearAllItems, resetToDefault,
        exportData, downloadSimpleTemplate, handleFileUpload,
        users, newUsername, newPassword, addUser, deleteUser
      };
    }
  });
  app.mount('#app');
</script>
</body>
</html>
